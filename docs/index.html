<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Sale Maps · Витрина</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./style.css" />
</head>

<body>
    <div class="wrap">
        <div class="top">
            <div class="brand">
                <h1>Sale Maps</h1>
                <p>
                    Авторская подборка лучших заведений для комфортного отдыха и прогулок
                </p>
            </div>
            <a class="chip" href="./catalog.html">🗺️ Каталог</a>
        </div>

        <div id="promo-slot"></div>

        <div class="legend-trigger-wrap">
            <button class="chip info-tab info-tab-wide" type="button" data-info="legend">
                🧭 Описание точек / Легенда
            </button>
        </div>

        <div class="info-tabs" role="tablist" aria-label="Информация">
            <button class="chip info-tab" type="button" data-info="about">ℹ️ О сервисе</button>
            <button class="chip info-tab" type="button" data-info="how">⚙️ Как работает</button>
            <button class="chip info-tab" type="button" data-info="support">🆘 Поддержка</button>
        </div>

        <div id="catalog" class="grid"></div>

        <div class="footer">
            © Sale Maps · 2026 · <a href="./offer.html">Оферта / Реквизиты</a>
        </div>
    </div>

    <a class="chip fab" id="fab-action" href="./catalog.html">🗺️ Каталог</a>

    <div class="info-panel" id="info-panel" aria-hidden="true">
        <div class="info-sheet">
            <div class="info-sheet-head">
                <div class="info-sheet-title" id="info-panel-title">Информация</div>
                <button class="info-close" type="button" aria-label="Закрыть">✕</button>
            </div>
            <div class="info-sheet-body" id="info-panel-body"></div>
        </div>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>

</body>
</html>
